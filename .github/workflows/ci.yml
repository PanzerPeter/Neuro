name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  lint:
    name: Formatter & Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1

      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2
      - name: Install cargo-audit
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.62.13
        with:
          tool: cargo-audit
      - name: Run Security Audit
        run: cargo audit

  docs_consistency:
    name: Docs Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Check docs status consistency
        run: python tools/check_docs_consistency.py

  architecture:
    name: Architecture Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Enforce VSA architecture boundaries
        run: cargo test -p neurc --test architecture_tests

  test:
    name: Test Suite
    needs: [lint, architecture]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust_version: [stable, nightly]
        # nightly is opt-in for experimental coverage — failures are
        # informational only and must not block merges
    # Allow nightly legs to fail without failing the whole workflow
    continue-on-error: ${{ matrix.rust_version == 'nightly' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2

      - name: Install Rust (${{ matrix.rust_version }})
        # Use @master (toolchain is a required input) when the channel varies by
        # matrix value. Pinning to @stable hardcodes the channel in the action
        # ref, so overriding it via `toolchain:` is unsupported and the nightly
        # leg bails out in the action's parse step.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust_version }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          # Separate cache keys per OS + toolchain to avoid poisoning
          key: ${{ matrix.os }}-${{ matrix.rust_version }}

      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm

      - name: Run Tests
        run: cargo test --workspace --all-targets --verbose

  benchmark_regression:
    name: Benchmark Regression
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Run llvm-backend benchmarks
        run: cargo bench -p llvm-backend --bench codegen_bench -- --sample-size 10
      - name: Check benchmark regression budget
        run: |
          python tools/check_benchmark_regression.py \
            --baseline tools/benchmarks/llvm_backend_codegen_baseline.json \
            --results-root target/criterion \
            --threshold-ratio 0.35

  release_smoke:
    name: Release Smoke Tests
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          key: ${{ matrix.os }}-stable
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Build release neurc
        run: cargo build -p neurc --release
      - name: Run release smoke tests (Windows)
        if: runner.os == 'Windows'
        run: python tools/run_release_smoke_tests.py --neurc target/release/neurc.exe
      - name: Run release smoke tests (Unix)
        if: runner.os != 'Windows'
        run: python tools/run_release_smoke_tests.py --neurc target/release/neurc

  build_artifacts:
    name: Build & Upload Artifacts
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
        with:
          key: ${{ matrix.os }}-stable
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm

      - name: Build Compiler Binary
        run: cargo build -p neurc --release

      - name: Upload Compiler Artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: neurc-${{ runner.os }}
          path: target/release/neurc

      - name: Upload Compiler Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: neurc-${{ runner.os }}
          path: target/release/neurc.exe

  coverage:
    name: Code Coverage
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.8.1
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Install tarpaulin
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.62.13
        with:
          tool: cargo-tarpaulin
      - name: Generate Coverage
        run: cargo tarpaulin --workspace --verbose --timeout 300 --out Xml
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.1
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

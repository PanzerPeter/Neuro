name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  lint:
    name: Formatter & Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check Workspace
        run: cargo check --workspace

  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run Security Audit
        run: cargo audit

  docs_consistency:
    name: Docs Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check docs status consistency
        run: python tools/check_docs_consistency.py

  architecture:
    name: Architecture Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Enforce VSA architecture boundaries
        run: cargo test -p neurc --test architecture_tests

  test:
    name: Test Suite
    needs: [lint, architecture]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust_version: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust (${{ matrix.rust_version }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
        
      - name: Run Tests
        run: cargo test --workspace --all-targets --verbose

  benchmark_regression:
    name: Benchmark Regression
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run llvm-backend benchmarks
        run: cargo bench -p llvm-backend --bench codegen_bench -- --sample-size 10
      - name: Check benchmark regression budget
        run: |
          python tools/check_benchmark_regression.py \
            --baseline tools/benchmarks/llvm_backend_codegen_baseline.json \
            --results-root target/criterion \
            --threshold-ratio 0.35

  release_smoke:
    name: Release Smoke Tests
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build release neurc
        run: cargo build -p neurc --release
      - name: Run release smoke tests (Windows)
        if: runner.os == 'Windows'
        run: python tools/run_release_smoke_tests.py --neurc target/release/neurc.exe
      - name: Run release smoke tests (Unix)
        if: runner.os != 'Windows'
        run: python tools/run_release_smoke_tests.py --neurc target/release/neurc

  build_artifacts:
    name: Build & Upload Artifacts
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
        
      - name: Build Compiler Binary
        run: cargo build -p neurc --release
        
      - name: Upload Compiler Artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: neurc-${{ runner.os }}
          path: target/release/neurc
          
      - name: Upload Compiler Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: neurc-${{ runner.os }}
          path: target/release/neurc.exe

  coverage:
    name: Code Coverage
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Generate Coverage
        run: cargo tarpaulin --all --verbose --timeout 300 --out Xml
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

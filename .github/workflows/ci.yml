name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  lint:
    name: Formatter & Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.8.1

      - name: Setup LLVM 20 (+ MLIR for --all-features)
        uses: ./.github/actions/setup-llvm
        with:
          mlir: "true"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run MLIR backend smoke test
        run: cargo test -p mlir-backend --features mlir

  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Install cargo-audit
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.62.13
        with:
          tool: cargo-audit
      - name: Run Security Audit
        run: cargo audit

  docs_consistency:
    name: Docs Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Check docs status consistency
        run: python tools/check_docs_consistency.py

  architecture:
    name: Architecture Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.8.1
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Enforce VSA architecture boundaries
        run: cargo test -p neurc --test architecture_tests

  test:
    name: Test Suite
    needs: [lint, architecture]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust_version: [stable, nightly]
        # nightly is opt-in for experimental coverage — failures are
        # informational only and must not block merges
    # Allow nightly legs to fail without failing the whole workflow
    continue-on-error: ${{ matrix.rust_version == 'nightly' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Install Rust (${{ matrix.rust_version }})
        # Use @master (toolchain is a required input) when the channel varies by
        # matrix value. Pinning to @stable hardcodes the channel in the action
        # ref, so overriding it via `toolchain:` is unsupported and the nightly
        # leg bails out in the action's parse step.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ matrix.rust_version }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.8.1
        with:
          # Separate cache keys per OS + toolchain to avoid poisoning
          key: ${{ matrix.os }}-${{ matrix.rust_version }}

      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm

      - name: Run Tests
        run: cargo test --workspace --all-targets --verbose

  benchmark_regression:
    name: Benchmark Regression
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.8.1
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Run llvm-backend benchmarks
        run: cargo bench -p llvm-backend --bench codegen_bench -- --sample-size 10
      - name: Check benchmark regression budget
        run: |
          python tools/check_benchmark_regression.py \
            --baseline tools/benchmarks/llvm_backend_codegen_baseline.json \
            --results-root target/criterion \
            --threshold-ratio 0.35

  release:
    name: Release Build, Smoke Test & Artifacts
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.8.1
        with:
          key: ${{ matrix.os }}-stable
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Build release neurc
        run: cargo build -p neurc --release

      - name: Run release smoke tests (Windows)
        if: runner.os == 'Windows'
        run: python tools/run_release_smoke_tests.py --neurc target/release/neurc.exe
      - name: Run release smoke tests (Unix)
        if: runner.os != 'Windows'
        run: python tools/run_release_smoke_tests.py --neurc target/release/neurc

      - name: Upload Compiler Artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: neurc-${{ runner.os }}
          path: target/release/neurc

      - name: Upload Compiler Artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: neurc-${{ runner.os }}
          path: target/release/neurc.exe

  coverage:
    name: Code Coverage
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable as of v1
        with:
          toolchain: stable
      - name: Rust Cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2.8.1
      - name: Setup LLVM 20
        uses: ./.github/actions/setup-llvm
      - name: Install tarpaulin
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.62.13
        with:
          tool: cargo-tarpaulin
      - name: Generate Coverage
        run: cargo tarpaulin --workspace --verbose --timeout 300 --out Xml
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5.5.1
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

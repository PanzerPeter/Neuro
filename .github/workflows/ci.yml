name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install LLVM 20 (Linux)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install -y llvm-20 llvm-20-dev
          # Verify the build script can locate llvm-config before cargo runs.
          /usr/lib/llvm-20/bin/llvm-config --version
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-20" >> $GITHUB_ENV

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check workspace
        run: cargo check --workspace

  architecture:
    name: Architecture
    runs-on: ubuntu-latest
    needs: [check, docs-consistency]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 20 (Linux)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install -y llvm-20 llvm-20-dev
          /usr/lib/llvm-20/bin/llvm-config --version
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-20" >> $GITHUB_ENV

      - name: Enforce VSA architecture boundaries
        run: cargo test -p neurc --test architecture_tests --verbose

  docs-consistency:
    name: Docs Consistency
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Check docs status consistency
        run: python tools/check_docs_consistency.py

  benchmark-regression:
    name: Benchmark Regression
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 20 (Linux)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install -y llvm-20 llvm-20-dev
          /usr/lib/llvm-20/bin/llvm-config --version
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-20" >> $GITHUB_ENV

      - name: Run llvm-backend benchmarks
        run: cargo bench -p llvm-backend --bench codegen_bench -- --sample-size 10

      - name: Check benchmark regression budget
        run: |
          python tools/check_benchmark_regression.py \
            --baseline tools/benchmarks/llvm_backend_codegen_baseline.json \
            --results-root target/criterion \
            --threshold-ratio 0.35

  release-smoke:
    name: Release Smoke
    needs: architecture
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Install LLVM 20 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install -y llvm-20 llvm-20-dev
          /usr/lib/llvm-20/bin/llvm-config --version
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-20" >> $GITHUB_ENV

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Install LLVM 20 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm@20
          LLVM_PREFIX="$(brew --prefix llvm@20)"
          "$LLVM_PREFIX/bin/llvm-config" --version
          echo "LLVM_SYS_201_PREFIX=$LLVM_PREFIX" >> $GITHUB_ENV

      # ── Windows ────────────────────────────────────────────────────────────
      # KyleMayes/install-llvm-action distributes pre-built archives that
      # include llvm-config.exe; it is reliable on Windows where the APT
      # approach is not applicable.
      - name: Install LLVM 20 (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        id: llvm-win
        with:
          version: "20"

      - name: Set LLVM_SYS_201_PREFIX (Windows)
        if: runner.os == 'Windows'
        run: echo "LLVM_SYS_201_PREFIX=${{ steps.llvm-win.outputs.llvm-path }}" >> $GITHUB_ENV
        shell: bash

      - name: Build release neurc
        run: cargo build -p neurc --release

      - name: Run release smoke tests (Windows)
        if: matrix.os == 'windows-latest'
        run: python tools/run_release_smoke_tests.py --neurc target/release/neurc.exe

      - name: Run release smoke tests (Unix)
        if: matrix.os != 'windows-latest'
        run: python tools/run_release_smoke_tests.py --neurc target/release/neurc

  test:
    name: Test
    needs: [architecture, benchmark-regression, release-smoke]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      # ── Linux ──────────────────────────────────────────────────────────────
      - name: Install LLVM 20 (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install -y llvm-20 llvm-20-dev
          /usr/lib/llvm-20/bin/llvm-config --version
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-20" >> $GITHUB_ENV

      # ── macOS ──────────────────────────────────────────────────────────────
      - name: Install LLVM 20 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm@20
          LLVM_PREFIX="$(brew --prefix llvm@20)"
          "$LLVM_PREFIX/bin/llvm-config" --version
          echo "LLVM_SYS_201_PREFIX=$LLVM_PREFIX" >> $GITHUB_ENV

      # ── Windows ────────────────────────────────────────────────────────────
      - name: Install LLVM 20 (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        id: llvm-win
        with:
          version: "20"

      - name: Set LLVM_SYS_201_PREFIX (Windows)
        if: runner.os == 'Windows'
        run: echo "LLVM_SYS_201_PREFIX=${{ steps.llvm-win.outputs.llvm-path }}" >> $GITHUB_ENV
        shell: bash

      - name: Run tests
        run: cargo test --all --verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 20 (Linux)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install -y llvm-20 llvm-20-dev
          /usr/lib/llvm-20/bin/llvm-config --version
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-20" >> $GITHUB_ENV

      - name: Build workspace (debug)
        run: cargo build --workspace --verbose

      - name: Build workspace (release)
        run: cargo build --workspace --release --verbose

      - name: Build compiler binary
        run: cargo build -p neurc --release

      - name: Upload compiler artifact
        uses: actions/upload-artifact@v4
        with:
          name: neurc-${{ runner.os }}
          path: target/release/neurc*

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM 20 (Linux)
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install -y llvm-20 llvm-20-dev
          /usr/lib/llvm-20/bin/llvm-config --version
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-20" >> $GITHUB_ENV

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      # tarpaulin re-invokes rustc with its own instrumentation flags but
      # inherits the process environment, so LLVM_SYS_201_PREFIX written to
      # $GITHUB_ENV in the step above is visible here without any extra work.
      - name: Generate coverage
        run: cargo tarpaulin --all --verbose --timeout 300 --out Xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./cobertura.xml
          fail_ci_if_error: false

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      # No LLVM needed — cargo-audit only reads Cargo.lock; it does not
      # compile any LLVM-dependent crates.
      - name: Run security audit
        run: cargo audit
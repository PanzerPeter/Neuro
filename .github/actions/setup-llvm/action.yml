name: "Setup LLVM 20"
description: "Installs LLVM 20 and sets LLVM_SYS_201_PREFIX for llvm-sys-201.x"
inputs: {}

runs:
  using: "composite"
  steps:

    # ── Linux ──────────────────────────────────────────────────────────────────
    - name: Install LLVM 20 (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail

        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null

        echo "deb http://apt.llvm.org/$(lsb_release -cs)/ \
          llvm-toolchain-$(lsb_release -cs)-20 main" \
          | sudo tee /etc/apt/sources.list.d/llvm.list

        sudo apt-get update -q
        sudo apt-get install -y \
          llvm-20 \
          llvm-20-dev \
          llvm-20-tools \
          libpolly-20-dev \
          libzstd-dev \
          zlib1g-dev

        # Sanity-check: ensure llvm-config resolves the correct version
        /usr/lib/llvm-20/bin/llvm-config --version | grep -E "^20\." \
          || { echo "ERROR: unexpected LLVM version"; exit 1; }

        {
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-20"
          echo "LLVM_LINK_LLVM_DYLIB=1"
          echo "PATH=/usr/lib/llvm-20/bin:$PATH"
        } >> "$GITHUB_ENV"

    # ── macOS ──────────────────────────────────────────────────────────────────
    - name: Install LLVM 20 (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail

        # Unlink any existing LLVM to avoid keg-only conflicts
        brew unlink llvm 2>/dev/null || true
        brew install llvm@20

        LLVM_PREFIX="$(brew --prefix llvm@20)"

        "$LLVM_PREFIX/bin/llvm-config" --version | grep -E "^20\." \
          || { echo "ERROR: unexpected LLVM version"; exit 1; }

        {
          echo "LLVM_SYS_201_PREFIX=$LLVM_PREFIX"
          echo "PATH=$LLVM_PREFIX/bin:$PATH"
          # macOS links statically by default — do NOT set LLVM_LINK_LLVM_DYLIB
        } >> "$GITHUB_ENV"

    # ── Windows ────────────────────────────────────────────────────────────────
    # The official LLVM Windows NSIS installer ships only Clang + LLVM-C.dll —
    # it does NOT include llvm-config.exe, headers, or static .lib files, so
    # llvm-sys (used by inkwell) cannot build against it. KyleMayes/install-
    # llvm-action repackages the same NSIS installer for Windows and has the
    # same limitation.
    #
    # We use vovkos/llvm-package-windows, which provides full LLVM dev builds
    # for Windows with MSVC toolchain in both /MD (msvcrt) and /MT (libcmt)
    # CRT variants. Rust's stable-x86_64-pc-windows-msvc target uses /MD by
    # default, so we pick the `msvcrt` variant.
    #
    # IMPORTANT: vovkos builds with LLVM_TARGETS_TO_BUILD=X86;NVPTX;AMDGPU.
    # Non-X86 backends (ARM, AArch64, RISCV, Mips, etc.) are NOT included.
    # inkwell must therefore use `target-x86` only — not `target-all`.
    #
    # Notes:
    #   - 7z.exe is preinstalled on windows-latest runners.
    #   - Archive top-level dir matches the asset basename; we move/rename it
    #     to C:\LLVM for a stable, space-free prefix path.
    #   - curl.exe is more reliable than Invoke-WebRequest for large binaries.
    #   - The extracted LLVM tree (~1 GB) is cached between runs using
    #     actions/cache keyed on the pinned version string.

    - name: Cache LLVM 20 (Windows)
      if: runner.os == 'Windows'
      uses: actions/cache@v4
      id: llvm-cache
      with:
        path: C:\LLVM
        key: llvm-20.1.8-windows-amd64-msvc17-msvcrt

    - name: Install LLVM 20 (Windows)
      if: runner.os == 'Windows' && steps.llvm-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $version = "20.1.8"
        $asset   = "llvm-$version-windows-amd64-msvc17-msvcrt"
        $url     = "https://github.com/vovkos/llvm-package-windows/releases/download/llvm-$version/$asset.7z"
        $archive = "$env:TEMP\$asset.7z"
        $extract = "$env:TEMP\llvm-extract"
        $prefix  = "C:\LLVM"

        Write-Host "Downloading LLVM dev build from vovkos/llvm-package-windows..."
        # Retry curl to absorb transient GitHub release CDN errors.
        curl.exe -fsSL --retry 5 --retry-delay 5 --retry-all-errors -o $archive $url
        if ($LASTEXITCODE -ne 0) { throw "curl failed (exit $LASTEXITCODE)" }

        Write-Host "Extracting $archive ..."
        if (Test-Path $extract) { Remove-Item -Recurse -Force $extract }
        New-Item -ItemType Directory -Force -Path $extract | Out-Null
        & 7z.exe x $archive "-o$extract" -y | Out-Null
        if ($LASTEXITCODE -ne 0) { throw "7z extract failed (exit $LASTEXITCODE)" }

        $inner = Join-Path $extract $asset
        if (-not (Test-Path $inner)) {
          # Some archives flatten differently; fall back to first subdir.
          $inner = (Get-ChildItem -Directory $extract | Select-Object -First 1).FullName
        }
        if (-not (Test-Path $inner)) { throw "Could not locate extracted LLVM root in $extract" }

        if (Test-Path $prefix) { Remove-Item -Recurse -Force $prefix }
        Move-Item -Path $inner -Destination $prefix

        Remove-Item $archive -ErrorAction SilentlyContinue
        Remove-Item -Recurse -Force $extract -ErrorAction SilentlyContinue

    - name: Configure LLVM env (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $prefix = "C:\LLVM"

        $llvmConfig = "$prefix\bin\llvm-config.exe"
        if (-not (Test-Path $llvmConfig)) {
          throw "llvm-config.exe not found at $llvmConfig"
        }

        $detected = & $llvmConfig --version
        Write-Host "Detected LLVM version: $detected"
        if ($detected -notmatch '^20\.') {
          throw "Unexpected LLVM version '$detected' — expected 20.x"
        }
        Write-Host "LLVM prefix: $prefix"

        # Persist env for subsequent steps.
        # llvm-sys on Windows/MSVC links statically — do NOT set
        # LLVM_LINK_LLVM_DYLIB. Default CRT linkage (/MD) matches the
        # `msvcrt` variant we downloaded.
        "LLVM_SYS_201_PREFIX=$prefix" | Out-File $env:GITHUB_ENV  -Append -Encoding utf8
        "$prefix\bin"                  | Out-File $env:GITHUB_PATH -Append -Encoding utf8

    - name: Verify LLVM prefix is set
      shell: bash
      run: |
        : "${LLVM_SYS_201_PREFIX:?LLVM_SYS_201_PREFIX is not set — LLVM install failed}"
        echo "LLVM_SYS_201_PREFIX = $LLVM_SYS_201_PREFIX"
        # Use llvm-config from PATH (bin dir was added above) to avoid
        # backslash path issues on Windows runners using Git Bash.
        llvm-config --version

name: "Setup LLVM 20"
description: "Installs LLVM 20 and sets LLVM_SYS_201_PREFIX for llvm-sys-201.x"
inputs: {}

runs:
  using: "composite"
  steps:

    # ── Linux ──────────────────────────────────────────────────────────────────
    - name: Install LLVM 20 (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail

        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
          | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null

        echo "deb http://apt.llvm.org/$(lsb_release -cs)/ \
          llvm-toolchain-$(lsb_release -cs)-20 main" \
          | sudo tee /etc/apt/sources.list.d/llvm.list

        sudo apt-get update -q
        sudo apt-get install -y \
          llvm-20 \
          llvm-20-dev \
          llvm-20-tools \
          libpolly-20-dev \
          libzstd-dev \
          zlib1g-dev

        # Sanity-check: ensure llvm-config resolves the correct version
        /usr/lib/llvm-20/bin/llvm-config --version | grep -E "^20\." \
          || { echo "ERROR: unexpected LLVM version"; exit 1; }

        {
          echo "LLVM_SYS_201_PREFIX=/usr/lib/llvm-20"
          echo "LLVM_LINK_LLVM_DYLIB=1"
          echo "PATH=/usr/lib/llvm-20/bin:$PATH"
        } >> "$GITHUB_ENV"

    # ── macOS ──────────────────────────────────────────────────────────────────
    - name: Install LLVM 20 (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail

        # Unlink any existing LLVM to avoid keg-only conflicts
        brew unlink llvm 2>/dev/null || true
        brew install llvm@20

        LLVM_PREFIX="$(brew --prefix llvm@20)"

        "$LLVM_PREFIX/bin/llvm-config" --version | grep -E "^20\." \
          || { echo "ERROR: unexpected LLVM version"; exit 1; }

        {
          echo "LLVM_SYS_201_PREFIX=$LLVM_PREFIX"
          echo "PATH=$LLVM_PREFIX/bin:$PATH"
          # macOS links statically by default — do NOT set LLVM_LINK_LLVM_DYLIB
        } >> "$GITHUB_ENV"

    # ── Windows ────────────────────────────────────────────────────────────────
    # KyleMayes/install-llvm-action ships prebuilt shared libs only; llvm-sys
    # on MSVC requires static libs, so we use the official NSIS installer from
    # the LLVM GitHub releases page instead.
    #
    # NSIS silent-install notes:
    #   - /S enables headless mode
    #   - /D= sets the install dir and MUST be the last argument, passed as a
    #     single string (not an array) so PowerShell doesn't add extra quoting
    #   - curl.exe (inbox on Windows Server 2022) is more reliable than
    #     Invoke-WebRequest for large binary downloads
    - name: Install LLVM 20 (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        $version   = "20.1.4"   # pin to a specific patch for reproducibility
        $installer = "$env:TEMP\llvm-installer.exe"
        $url       = "https://github.com/llvm/llvm-project/releases/download/" +
                     "llvmorg-$version/LLVM-$version-win64.exe"
        $targetDir = 'C:\LLVM'

        Write-Host "Downloading LLVM $version from $url"
        # curl.exe is more reliable than Invoke-WebRequest for large files
        curl.exe -fsSL -o $installer $url
        if ($LASTEXITCODE -ne 0) { throw "curl download failed (exit $LASTEXITCODE)" }

        Write-Host "Running silent NSIS install to $targetDir ..."
        # Single-string ArgumentList: NSIS parses its own raw command line via
        # GetCommandLine(), so /D= must be last and must not be quoted.
        $proc = Start-Process -FilePath $installer `
                  -ArgumentList "/S /D=$targetDir" `
                  -Wait -PassThru
        Write-Host "Installer exit code: $($proc.ExitCode)"

        # Locate llvm-config — fall back to the default NSIS path if /D= was
        # ignored (older NSIS builds sometimes do this).
        $candidates = @("$targetDir\bin\llvm-config.exe",
                        'C:\Program Files\LLVM\bin\llvm-config.exe')
        $llvmConfig = $null
        foreach ($c in $candidates) {
          if (Test-Path $c) { $llvmConfig = $c; $targetDir = Split-Path (Split-Path $c); break }
        }
        if (-not $llvmConfig) {
          # Last resort: check PATH (e.g. if a system-wide LLVM is already present)
          $inPath = Get-Command llvm-config.exe -ErrorAction SilentlyContinue
          if ($inPath) {
            $llvmConfig = $inPath.Path
            $targetDir  = Split-Path (Split-Path $llvmConfig)
          } else {
            throw "llvm-config.exe not found after install (exit code $($proc.ExitCode)). Searched: $($candidates -join ', ')"
          }
        }

        $detected = & $llvmConfig --version
        Write-Host "Detected LLVM version: $detected  (prefix: $targetDir)"
        if ($detected -notmatch '^20\.') {
          throw "Unexpected LLVM version '$detected' — expected 20.x"
        }

        # Persist env for subsequent steps
        "LLVM_SYS_201_PREFIX=$targetDir" | Out-File $env:GITHUB_ENV  -Append -Encoding utf8
        "$targetDir\bin"                  | Out-File $env:GITHUB_PATH -Append -Encoding utf8

        # llvm-sys on Windows/MSVC links statically — do NOT set LLVM_LINK_LLVM_DYLIB

    - name: Verify LLVM prefix is set
      shell: bash
      run: |
        : "${LLVM_SYS_201_PREFIX:?LLVM_SYS_201_PREFIX is not set — LLVM install failed}"
        echo "LLVM_SYS_201_PREFIX = $LLVM_SYS_201_PREFIX"
        # Use llvm-config from PATH (bin dir was added above) to avoid
        # backslash path issues on Windows runners using Git Bash.
        llvm-config --version
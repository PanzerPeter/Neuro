# Dependabot keeps dependencies — including the SHA-pinned GitHub Actions in
# .github/workflows — current, satisfying the Scorecard Dependency-Update-Tool
# check while preserving pinned-by-digest hardening.
version: 2
updates:
  # GitHub Actions used by the CI / security workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns:
          - "*"

  # Rust crates in the Cargo workspace.
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
    groups:
      cargo:
        patterns:
          - "*"
    # These two are pinned deliberately (see the rationale comments in the root
    # Cargo.toml) and must not be auto-bumped:
    #   * logos 0.16 is a lexer-engine rewrite (source attr removed, changed
    #     regex semantics, MSRV 1.80) — needs a hand-migrated + retested lexer.
    #   * melior 0.26+ targets MLIR 21/22; this compiler is built against
    #     LLVM/MLIR 20, so newer melior fails to link.
    ignore:
      - dependency-name: "logos"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "melior"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
